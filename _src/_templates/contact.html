{% extends "base.html" %}
{% block title %}Contact Us | {{ site.name }}{% endblock %}

{% block content %}
<div class="container section page-content" style="max-width: 800px; margin: 0 auto;">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you. Whether you have a question about our content, a business inquiry, or just want to say hi, use the form below to get in touch.</p>
    
    <form class="contact-form" onsubmit="event.preventDefault(); alert('Form submission placeholder. Needs backend integration.');">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
</div>
{% endblock %}
