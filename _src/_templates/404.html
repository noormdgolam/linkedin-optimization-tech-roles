{% extends "base.html" %}
{% block title %}404 - Page Not Found | {{ site.name }}{% endblock %}

{% block content %}
<div class="container section page-content" style="text-align:center; padding: 5rem 1rem;">
    <h1 style="font-size: 5rem; margin-bottom: 1rem; color: var(--primary);">404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/" class="btn btn-primary" style="margin-top: 2rem;">Return to Homepage</a>
</div>
{% endblock %}
